<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="OPay offers secure, easy, and affordable financial solutions. Enjoy fast transactions, incentives, and a reliable debit card."
    />
    <meta
      name="keywords"
      content="mobile money, payments, transfers, loans, utility bills, atm card, pos terminal"
    />
    <meta name="creator" content="Emmanuel Tugbeh" />
    <meta name="owner" content="Opera Software" />
    <meta name="copyright" content="2018" />
    <meta name="theme-color" content="#f2f2f7" />
    <!-- OpenGraph -->
    <meta property="og:title" content="OPay | We are Beyond Banking" />
    <meta
      property="og:description"
      content="OPay offers secure, easy, and affordable financial solutions. Enjoy fast transactions, incentives, and a reliable debit card."
    />
    <meta
      property="og:image"
      content="https://gstatic.opayweb.com/website-ng/img/indexBanner.dd8ae3e.jpg"
    />
    <meta property="og:url" content="https://opayweb.com" />
    <meta property="og:type" content="website" />
    <!-- Stylesheet -->
    <link type="text/css" href="styles/base.css" rel="stylesheet" />
    <link type="text/css" href="styles/components.css" rel="stylesheet" />
    <link type="text/css" href="styles/utilities.css" rel="stylesheet" />
    <link type="text/css" href="styles/template.css" rel="stylesheet" />
    <link type="image/png" href="https://opayweb.com/favicon.png" rel="icon" />
    <title>OPay | We are Beyond Banking</title>
  </head>
  <body>
    <div class="container">
      <header>
        <a href="#" class="back" aria-label="Go back">&#8592;</a>
        <h1>Transfer to OPay Account</h1>
        <a href="#" class="records">Records</a>
      </header>

      <section class="recipient" aria-label="Recipient details">
        <img src="https://podcast.northwindai.org/images/photo-etugbeh.png" alt="" class="avatar" role="img" />
        <div class="recipient-info">
          <strong>EMMANUEL TUGBEH</strong>
          <span>816 996 0927</span>
        </div>
      </section>

      <section class="amount-card" aria-label="Amount">
        <div class="amount-header">
          <span class="amount-label">Amount</span>
          <span class="no-fee">No Transaction Fees</span>
        </div>
        <div class="thousands-badge">Thousands</div>
        <div class="amount-row">
          <span class="amount-value">₦ 2,000.00</span>
          <button class="clear-btn" aria-label="Clear amount">&#x2715;</button>
        </div>
        <div class="divider"></div>
        <div
          class="quick-amounts"
          role="group"
          aria-label="Quick select amount"
        >
          <button class="chip">₦500</button>
          <button class="chip">₦1,000</button>
          <button class="chip active">₦2,000</button>
          <button class="chip">₦5,000</button>
          <button class="chip">₦9,999</button>
          <button class="chip">₦10,000</button>
        </div>
      </section>

      <section class="remark-card" aria-label="Remark">
        <p class="remark-label">Remark</p>
        <p class="remark-value">Personal Transfer</p>
        <div class="remark-toggle" role="group" aria-label="Transfer type">
          <button class="inactive">Purchase</button>
          <button class="active">Personal</button>
        </div>
      </section>

      <div class="spacer"></div>

      <footer>
        <button class="confirm-btn">Confirm</button>
      </footer>
    </div>

    <!-- Scripts -->
    <script type="text/javascript" src="app.js"></script>
  </body>
</html>
